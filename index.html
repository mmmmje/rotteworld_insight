<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTE WORLD INSIGHT</title>
    <!-- 필수 외부 라이브러리 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 아이콘 컴포넌트 래퍼
        const Icon = ({ name, size = 16, className = "" }) => {
            const [svg, setSvg] = useState("");

            useEffect(() => {
                if (window.lucide) {
                    const iconSvg = window.lucide.createIcons({
                        icons: { [name]: {} },
                        attrs: {
                            width: size,
                            height: size,
                            class: className,
                            'stroke-width': 2.5
                        }
                    });
                }
            }, [name, size, className]);

            // React에서 직접 Lucide를 사용하기 어려운 환경을 위해 SVG 렌더링 방식 대신 
            // 런타임에서 i 태그를 생성하여 lucide가 변환하도록 합니다.
            return <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        const App = () => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedLocation, setSelectedLocation] = useState('전체');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [expandedId, setExpandedId] = useState(null);

            // Lucide 아이콘 리프레시를 위한 Effect
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const categories = ['전체', '스릴', '패밀리', '롤러코스터', '키즈', '다크라이드', '체험', '시어터', '슈팅', '모노레일'];
            const locations = ['전체', '어드벤처 4F', '어드벤처 3F', '어드벤처 2F', '어드벤처 1F', '언더랜드(B1)', '키디존', '매직아일랜드', '메이플 아일랜드'];

            // 데이터 배열 (이곳에 44개를 붙여넣으세요)
            const rides = [
                { 
                    id: 1, 
                    name: "파라오의 분노", 
                    location: "어드벤처 4F", 
                    type: "멀티모션 다크라이드", 
                    category: "다크라이드", 
                    fun: 4.5, 
                    thrill: 3.5, 
                    wait: 5, 
                    description: "정교한 이집트 신전 내부를 지프차로 탐험하는 모험.", 
                    tags: ["가족", "어드벤처"], 
                    height: "110cm 이상", 
                    weight: null, 
                    info: { reservation: false, single: false, kidsOnly: false, phobia: false, paid: false, is3D: false, isPopular: true }, 
                    details: "실제 보물을 찾는 듯한 정교한 세트장이 일품입니다." 
                },
                { 
                    id: 35, 
                    name: "아트란티스", 
                    location: "매직아일랜드", 
                    type: "급발진 코스터", 
                    category: "스릴", 
                    fun: 5, 
                    thrill: 5, 
                    wait: 5, 
                    description: "시속 72km 급발진과 롤러코스터의 짜릿함을 동시에.", 
                    tags: ["예약제", "강력스릴"], 
                    height: "135cm ~ 190cm", 
                    weight: "100kg 미만", 
                    info: { reservation: true, single: false, kidsOnly: false, phobia: true, paid: false, is3D: false, isPopular: true }, 
                    details: "롯데월드 1위 인기 기구입니다." 
                }
            ];

            const filteredRides = useMemo(() => {
                return rides.filter(ride => {
                    const matchesSearch = ride.name.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesLocation = selectedLocation === '전체' || ride.location.includes(selectedLocation);
                    const matchesCategory = selectedCategory === '전체' || ride.category === selectedCategory;
                    return matchesSearch && matchesLocation && matchesCategory;
                });
            }, [searchTerm, selectedLocation, selectedCategory, rides]);

            const StatBar = ({ iconName, label, value, colorClass }) => {
                const numValue = value === "?" ? 0 : parseFloat(value);
                const percentage = Math.min((numValue / 5) * 100, 100);
                
                return (
                    <div className="flex-1">
                        <div className={`flex items-center gap-1 text-[10px] font-bold mb-1 uppercase ${colorClass}`}>
                            <Icon name={iconName} size={12} />
                            {label}
                        </div>
                        <div className="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                            {value === "?" ? (
                                <div className="h-full bg-slate-200 w-full animate-pulse" />
                            ) : (
                                <div 
                                    className={`h-full transition-all duration-500 ${colorClass.replace('text-', 'bg-')}`} 
                                    style={{ width: `${percentage}%` }} 
                                />
                            )}
                        </div>
                        <div className="text-[10px] font-bold text-slate-500 mt-1">{value}</div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-10">
                    <header className="bg-white border-b border-slate-200 sticky top-0 z-30 px-4 py-5 shadow-sm">
                        <div className="flex items-center justify-between mb-5">
                            <div className="flex items-center gap-2">
                                <div className="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center text-white font-black shadow-lg shadow-red-100">L</div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tighter italic">LOTTE WORLD</h1>
                            </div>
                            <div className="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">Insight Pro</div>
                        </div>

                        <div className="relative mb-4">
                            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                                <Icon name="search" size={18} />
                            </div>
                            <input 
                                type="text" 
                                placeholder="기구 이름을 검색하세요..." 
                                className="w-full pl-10 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm focus:ring-2 focus:ring-red-500 outline-none transition-all"
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                            />
                        </div>

                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                            {categories.map(cat => (
                                <button 
                                    key={cat}
                                    onClick={() => setSelectedCategory(cat)}
                                    className={`px-4 py-1.5 rounded-full whitespace-nowrap text-xs font-bold border transition-all ${
                                        selectedCategory === cat 
                                        ? 'bg-red-600 text-white border-red-600 shadow-lg shadow-red-100 scale-105' 
                                        : 'bg-white text-slate-500 border-slate-200'
                                    }`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main className="p-4 space-y-4">
                        <div className="flex items-center justify-between px-1">
                            <h2 className="text-[11px] font-bold text-slate-400 tracking-widest uppercase">
                                {filteredRides.length} Attractions
                            </h2>
                            <div className="flex items-center gap-1 bg-white border border-slate-200 px-3 py-1.5 rounded-xl text-xs font-bold text-slate-600">
                                <Icon name="map-pin" size={12} className="text-red-500" />
                                <select 
                                    className="bg-transparent outline-none cursor-pointer ml-1"
                                    value={selectedLocation}
                                    onChange={(e) => setSelectedLocation(e.target.value)}
                                >
                                    {locations.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="grid gap-4">
                            {filteredRides.map(ride => {
                                const isExpanded = expandedId === ride.id;
                                
                                return (
                                    <div 
                                        key={ride.id}
                                        className={`bg-white rounded-3xl border transition-all duration-300 overflow-hidden ${
                                            isExpanded 
                                            ? 'ring-2 ring-red-500 border-transparent shadow-2xl' 
                                            : 'border-slate-100 shadow-sm'
                                        }`}
                                        onClick={() => setExpandedId(isExpanded ? null : ride.id)}
                                    >
                                        <div className="p-5">
                                            <div className="flex justify-between items-start mb-3">
                                                <div>
                                                    <div className="flex items-center gap-1.5 mb-2">
                                                        <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full border border-slate-200">
                                                            {ride.location}
                                                        </span>
                                                        {ride.info.isPopular && <span className="text-[10px] font-black text-red-600 uppercase italic tracking-tighter">HOT</span>}
                                                    </div>
                                                    <h3 className="text-xl font-black text-slate-900">{ride.name}</h3>
                                                </div>
                                                <div className={`p-2 rounded-full transition-colors ${isExpanded ? 'bg-red-50 text-red-500' : 'bg-slate-50 text-slate-300'}`}>
                                                    <Icon name={isExpanded ? "chevron-up" : "chevron-down"} size={20} />
                                                </div>
                                            </div>

                                            <p className={`text-sm text-slate-500 mb-5 leading-relaxed ${!isExpanded && 'line-clamp-1'}`}>
                                                {ride.description}
                                            </p>

                                            <div className="flex gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                                <StatBar iconName="star" label="FUN" value={ride.fun} colorClass="text-yellow-500" />
                                                <StatBar iconName="zap" label="THRILL" value={ride.thrill} colorClass="text-purple-600" />
                                                <StatBar iconName="clock" label="WAIT" value={ride.wait} colorClass="text-red-500" />
                                            </div>

                                            {isExpanded && (
                                                <div className="mt-5 pt-5 border-t border-slate-100 space-y-5 animate-in fade-in duration-500">
                                                    <div className="grid grid-cols-2 gap-3">
                                                        <div className="flex items-center gap-3 p-3 rounded-2xl bg-white border border-slate-100 shadow-sm">
                                                            <Icon name="ruler" size={16} className="text-slate-400" />
                                                            <div className="flex flex-col">
                                                                <span className="text-[9px] font-bold text-slate-400">신장 제한</span>
                                                                <span className="text-xs font-bold text-slate-700">{ride.height || "제한 없음"}</span>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-3 p-3 rounded-2xl bg-white border border-slate-100 shadow-sm">
                                                            <Icon name="info" size={16} className="text-slate-400" />
                                                            <div className="flex flex-col">
                                                                <span className="text-[9px] font-bold text-slate-400">체중/기타</span>
                                                                <span className="text-xs font-bold text-slate-700">{ride.weight || "제한 없음"}</span>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <div className="flex flex-wrap gap-2">
                                                        {ride.info.reservation && <span className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-indigo-50 text-indigo-700 text-[10px] font-black border border-indigo-100 leading-none">매직패스 예약</span>}
                                                        {ride.info.single && <span className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-emerald-50 text-emerald-700 text-[10px] font-black border border-emerald-100 leading-none">싱글라이더</span>}
                                                        {ride.info.is3D && <span className="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-orange-50 text-orange-700 text-[10px] font-black border border-orange-100 leading-none">3D 입체영상</span>}
                                                    </div>

                                                    <div className="p-4 bg-red-50 rounded-2xl border border-red-100">
                                                        <div className="flex items-center gap-2 mb-2 text-red-600 font-black text-xs">
                                                            <Icon name="lightbulb" size={14} /> 가이드 팁
                                                        </div>
                                                        <p className="text-xs font-medium text-slate-700 leading-relaxed">
                                                            {ride.details}
                                                        </p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
