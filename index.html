<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTE WORLD INSIGHT</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Lucide 아이콘 추출
        const { 
            Star, Zap, Clock, Info, Search, Filter, Map, MapPin, 
            ChevronDown, ChevronUp, AlertCircle, Users, Ticket, 
            UserCheck, Ruler, CreditCard, Box, Sparkles, Construction, 
            Ghost, Monitor 
        } = LucideReact;

        const { useState } = React;

        const App = () => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedLocation, setSelectedLocation] = useState('전체');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [expandedId, setExpandedId] = useState(null);

            const categories = ['전체', '스릴', '패밀리', '롤러코스터', '키즈', '다크라이드', '체험', '시어터', '슈팅', '모노레일'];
            const locations = ['전체', '어드벤처 4F', '어드벤처 3F', '어드벤처 2F', '어드벤처 1F', '언더랜드(B1)', '키디존', '매직아일랜드', '메이플 아일랜드'];

            // 사용자님의 데이터 (일부 생략 없이 그대로 유지)
            const rides = [
                { id: 1, name: "파라오의 분노", location: "어드벤처 4F", type: "멀티모션 다크라이드", category: "다크라이드", fun: 4.5, thrill: 3.5, wait: 5, description: "정교한 이집트 신전 내부를 지프차로 탐험하는 모험.", tags: ["가족", "어드벤처"], height: "110cm 이상", weight: null, info: { reservation: false, single: false, kidsOnly: false, phobia: false, paid: false, is3D: false, isPopular: true }, details: "실제 보물을 찾는 듯한 정교한 세트장이 일품입니다. 매일 오후 2시 30분부터 3시 30분까지 점검을 합니다. 싱글라이더가 사라졌습니다." },
                { id: 2, name: "풍선비행", location: "어드벤처 4F", type: "공중궤도 라이드(공중 모노레일)", category: "패밀리", fun: 2.5, thrill: 1.5, wait: 4.5, description: "하늘 위에서 롯데월드 전체를 조망하는 낭만적인 비행.", tags: ["고소공포주의", "뷰맛집"], height: null, weight: null, info: { reservation: false, single: false, kidsOnly: false, phobia: true, paid: false, is3D: false, isPopular: true }, details: "상당히 높은 곳에서 이동하므로 고소공포증이 있다면 주의하세요." },
                { id: 3, name: "어크로스다크", location: "어드벤처 4F", type: "시어터형 라이드", category: "체험", fun: 2.5, thrill: 1, wait: 1.5, description: "우주 공간을 배경으로 펼쳐지는 초대형 시네마틱 시어터 모험.", tags: ["시어터", "우주", "영상"], height: "110cm 이상", weight: null, info: { reservation: false, single: false, kidsOnly: false, phobia: false, paid: false, is3D: true, isPopular: false }, details: "광활한 우주 영상을 감상하며 즐기는 몰입형 시어터 시설입니다. 좌석의 움직임은 진동 제외 거의 존재하지 않습니다." },
                { id: 7, name: "후렌치 레볼루션", location: "어드벤처 2F", type: "롤러코스터", category: "스릴", fun: 4.5, thrill: 4.5, wait: 4.5, description: "360도 회전하며 건물 사이를 아슬아슬하게 통과하는 코스터.", tags: ["싱글라이더", "스릴러"], height: "120cm 이상", weight: null, info: { reservation: true, single: true, kidsOnly: false, phobia: true, paid: false, is3D: false, isPopular: true }, details: "실내 최고의 인기 시설입니다." },
                { id: 11, name: "후룸라이드", location: "어드벤처 1F", type: "워터 라이드", category: "스릴", fun: 4.5, thrill: 3, wait: 4.5, description: "통나무 배를 타고 급류를 헤쳐나가는 시원한 폭포 하강.", tags: ["물튐주의", "커플추천"], height: "110cm 이상", weight: null, info: { reservation: true, single: false, kidsOnly: false, phobia: false, paid: false, is3D: false, isPopular: true }, details: "탑승 시 물이 많이 튈 수 있습니다." },
                { id: 35, name: "아트란티스", location: "매직아일랜드", type: "급발진 코스터", category: "스릴", fun: 5, thrill: 5, wait: 5, description: "시속 72km 급발진과 롤러코스터의 짜릿함을 동시에.", tags: ["예약제", "강력스릴", "대표기구"], height: "135cm ~ 190cm", weight: "100kg 미만", info: { reservation: true, single: false, kidsOnly: false, phobia: true, paid: false, is3D: false, isPopular: true }, details: "롯데월드 1위 인기 기구입니다." },
                { id: 100, name: "스톤 익스프레스", location: "메이플 아일랜드", type: "패밀리 코스터", category: "패밀리", fun: "?", thrill: "?", wait: "?", description: "메이플스토리 세계관을 배경으로 온 가족이 즐기는 패밀리 코스터.", tags: ["오픈예정", "메이플스토리", "가족형"], height: "준비 중", weight: null, info: { isPlanned: true, reservation: false, single: false, kidsOnly: false, phobia: false, paid: false, is3D: false, isPopular: false }, details: "가족 타겟의 경쾌한 주행을 기대할 수 있습니다. 스릴은 낮을 걸로 보입니다." }
                // ... (사용자님의 다른 데이터들도 이 배열 안에 그대로 유지하면 됩니다)
            ];

            const filteredRides = rides.filter(ride => {
                const matchesSearch = ride.name.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesLocation = selectedLocation === '전체' || ride.location.includes(selectedLocation);
                const matchesCategory = selectedCategory === '전체' || ride.category === selectedCategory;
                return matchesSearch && matchesLocation && matchesCategory;
            });

            const StatBar = ({ icon: Icon, label, value, color }) => (
                <div className="flex flex-col gap-1 flex-1">
                    <div className="flex items-center gap-1 text-[10px] font-bold text-gray-400 uppercase">
                        <Icon size={12} className={color} />
                        {label}
                    </div>
                    <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                        {value === "?" ? (
                            <div className="h-full bg-slate-200 w-full animate-pulse" />
                        ) : (
                            <div className={`h-full ${color.replace('text-', 'bg-')}`} style={{ width: `${(value / 5) * 100}%` }} />
                        )}
                    </div>
                    <span className="text-[10px] font-bold text-gray-600 mt-0.5">{value} / 5</span>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans pb-10">
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
                        <div className="max-w-md mx-auto p-4 md:p-6">
                            <div className="flex items-center gap-2 mb-4">
                                <div className="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center text-white font-black shadow-lg shadow-red-200">L</div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight">LOTTE WORLD INSIGHT</h1>
                            </div>
                            <div className="relative mb-4">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                <input 
                                    type="text" 
                                    placeholder="기구 이름 검색..." 
                                    className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-100 border-none text-sm focus:ring-2 focus:ring-red-400 outline-none transition-all"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                                {categories.map((cat) => (
                                    <button key={cat} onClick={() => setSelectedCategory(cat)}
                                        className={`px-4 py-1.5 rounded-full whitespace-nowrap text-xs font-bold border transition-all ${selectedCategory === cat ? 'bg-red-500 text-white border-red-500 shadow-md' : 'bg-white text-slate-500 border-slate-200'}`}>
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto p-4 space-y-4">
                        <div className="flex justify-between items-center px-1">
                            <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">{filteredRides.length} Results</span>
                            <div className="flex items-center gap-1 text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg border border-red-100">
                                <MapPin size={14} />
                                <select className="bg-transparent outline-none cursor-pointer" value={selectedLocation} onChange={(e) => setSelectedLocation(e.target.value)}>
                                    {locations.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="grid gap-4">
                            {filteredRides.map((ride) => {
                                const isExpanded = expandedId === ride.id;
                                let cardStyle = "bg-white border-slate-100";
                                if (ride.info.kidsOnly) cardStyle = "bg-blue-50/50 border-blue-300 shadow-blue-50";
                                if (ride.info.paid) cardStyle = "bg-emerald-50/50 border-emerald-300"; 
                                if (ride.info.is3D) cardStyle = "bg-orange-50/50 border-orange-400 ring-1 ring-orange-200 shadow-orange-50";
                                if (ride.info.isPlanned) cardStyle = "bg-slate-100 border-slate-300 opacity-80";
                                if (isExpanded) cardStyle += " ring-2 ring-red-100 border-red-500";

                                return (
                                    <div key={ride.id} className={`rounded-2xl overflow-hidden shadow-sm border transition-all cursor-pointer ${cardStyle} hover:shadow-md`}
                                        onClick={() => setExpandedId(isExpanded ? null : ride.id)}>
                                        <div className="p-4">
                                            <div className="flex justify-between items-start">
                                                <div className="flex-1">
                                                    <div className="flex flex-wrap items-center gap-2 mb-1">
                                                        <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-white/80 text-slate-500 border border-slate-200 uppercase">{ride.location}</span>
                                                        {ride.info.kidsOnly && <span className="text-[10px] font-black px-2 py-0.5 rounded bg-blue-500 text-white flex items-center gap-1"><Users size={10}/> 어린이</span>}
                                                        {ride.info.paid && <span className="text-[10px] font-black px-2 py-0.5 rounded bg-emerald-600 text-white flex items-center gap-1"><CreditCard size={10}/> 유료</span>}
                                                        {ride.info.is3D && <span className="text-[10px] font-black px-2 py-0.5 rounded bg-orange-600 text-white flex items-center gap-1"><Monitor size={10}/> 3D/시어터</span>}
                                                        {ride.info.isPlanned && <span className="text-[10px] font-black px-2 py-0.5 rounded bg-slate-500 text-white flex items-center gap-1"><Construction size={10}/> 예정</span>}
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <h3 className="text-lg font-black text-slate-800 tracking-tight">{ride.name}</h3>
                                                        {ride.info.isPopular && <span className="text-red-500">🔥</span>}
                                                    </div>
                                                </div>
                                                <div className="p-1 rounded-full bg-slate-100/50 text-slate-400">
                                                    {isExpanded ? <ChevronUp size={18} /> : <ChevronDown size={18} />}
                                                </div>
                                            </div>
                                            <p className={`text-xs text-slate-500 mt-2 mb-4 leading-relaxed ${!isExpanded && 'line-clamp-1'}`}>{ride.description}</p>
                                            <div className="flex gap-4 p-3 bg-white/60 rounded-xl mb-2 backdrop-blur-sm">
                                                <StatBar icon={Star} label="FUN" value={ride.fun} color="text-yellow-500" />
                                                <StatBar icon={Zap} label="THRILL" value={ride.thrill} color="text-purple-500" />
                                                <StatBar icon={Clock} label="WAIT" value={ride.wait} color="text-red-500" />
                                            </div>
                                            {isExpanded && (
                                                <div className="mt-4 pt-4 border-t border-slate-200/50 space-y-4">
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {ride.tags?.map(tag => <span key={tag} className="text-[10px] font-bold text-slate-500 bg-slate-200/50 px-2 py-1 rounded">#{tag}</span>)}
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-2">
                                                        <div className="flex items-center gap-2 p-2 rounded-lg bg-white border border-slate-100"><Ruler size={14} className="text-slate-400" /><span className="text-[11px] font-bold text-slate-600">{ride.height || "제한 없음"}</span></div>
                                                        <div className="flex items-center gap-2 p-2 rounded-lg bg-white border border-slate-100"><AlertCircle size={14} className="text-slate-400" /><span className="text-[11px] font-bold text-slate-600">{ride.weight || "상관 없음"}</span></div>
                                                    </div>
                                                    <div className="flex flex-wrap gap-2">
                                                        {ride.info.reservation && <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-indigo-50 text-indigo-700 text-[10px] font-black border border-indigo-100"><Ticket size={12}/> 탑승예약제</div>}
                                                        {ride.info.single && <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700 text-[10px] font-black border border-emerald-100"><UserCheck size={12}/> 싱글라이더</div>}
                                                        {ride.info.phobia && <div className="flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-orange-50 text-orange-700 text-[10px] font-black border border-orange-100"><AlertCircle size={12}/> 고소공포주의</div>}
                                                    </div>
                                                    <div className="p-3 bg-slate-50 rounded-xl border border-slate-200">
                                                        <p className="text-[11px] font-bold text-slate-600 leading-relaxed">💡 <span className="underline">Tip & Notice</span>: {ride.details}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
