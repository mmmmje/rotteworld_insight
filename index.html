<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotte World Insight</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f1f5f9;
        }

        .custom-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Card Expansion Animation */
        .details-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.2s;
            opacity: 0;
        }
        .is-expanded .details-panel {
            max-height: 1000px;
            opacity: 1;
            transition: max-height 0.5s ease-in, opacity 0.4s;
        }
        
        .card-container {
            transition: transform 0.2s, border-color 0.2s;
        }
        .is-expanded.card-container {
            border-color: #ef4444;
            transform: translateY(-2px);
        }

        /* SVG Icon Helpers */
        .icon-sm { width: 14px; height: 14px; }
    </style>
</head>
<body class="max-w-lg mx-auto min-h-screen bg-slate-50 pb-10">

    <!-- Header Section -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-5 py-4">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center text-white font-black text-lg">L</div>
                <h1 class="font-black text-slate-900 tracking-tight text-xl uppercase italic">Insight</h1>
            </div>
            <div id="itemCount" class="text-[10px] font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded-md uppercase tracking-wider">
                0 Items
            </div>
        </div>

        <!-- Search Input -->
        <div class="relative group">
            <input 
                type="text" 
                id="searchBar"
                placeholder="어트랙션 이름을 입력하세요..." 
                class="w-full bg-slate-100 border-none rounded-2xl py-3.5 pl-5 pr-12 text-sm focus:ring-2 focus:ring-red-500/20 outline-none transition-all placeholder:text-slate-400 font-medium"
            >
            <div class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
            </div>
        </div>

        <!-- Filter Pills -->
        <div id="categoryContainer" class="flex gap-2 overflow-x-auto hide-scrollbar mt-4 pb-1">
            <!-- Dynamically injected categories -->
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="px-5 mt-6">
        <div id="rideList" class="space-y-4">
            <!-- Dynamically injected cards -->
        </div>
    </main>

    <script>
        // --- 1. DATA DEFINITION ---
        const RIDES = [
            {
                id: 1,
                name: "파라오의 분노",
                location: "어드벤처 4F",
                category: "다크라이드",
                fun: 4.5,
                thrill: 3.2,
                wait: 4.8,
                desc: "지프차를 타고 이집트 신전의 보물을 찾아 떠나는 신비로운 모험!",
                height: "110cm 이상",
                restrictions: "임산부, 노약자 이용 제한",
                tips: "매직패스 예약이 필수적이며, 대기 줄의 인테리어가 훌륭하니 천천히 구경하세요.",
                isHot: true
            },
            {
                id: 2,
                name: "아트란티스",
                location: "매직아일랜드",
                category: "스릴",
                fun: 5.0,
                thrill: 5.0,
                wait: 5.0,
                desc: "국내 유일의 급발진 롤러코스터! 최고 시속 72km의 짜릿한 속도감을 느껴보세요.",
                height: "135cm - 190cm",
                restrictions: "허리둘레 38인치 이상 제한",
                tips: "오픈런 1순위입니다. 싱글라이더 제도를 활용하면 더 빨리 탈 수 있습니다.",
                isHot: true
            }
        ];

        const CATEGORIES = ["전체", "스릴", "다크라이드", "패밀리", "키즈", "체험"];

        // --- 2. STATE MANAGEMENT ---
        let currentFilter = "전체";
        let searchQuery = "";
        let expandedId = null;

        // --- 3. CORE FUNCTIONS ---

        function init() {
            renderCategories();
            renderList();

            // Search Event
            document.getElementById('searchBar').addEventListener('input', (e) => {
                searchQuery = e.target.value.toLowerCase();
                renderList();
            });
        }

        function renderCategories() {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = CATEGORIES.map(cat => `
                <button 
                    onclick="setCategory('${cat}')"
                    class="px-5 py-2 rounded-full whitespace-nowrap text-[13px] font-bold border transition-all ${currentFilter === cat ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-500 border-slate-200'}"
                >
                    ${cat}
                </button>
            `).join('');
        }

        window.setCategory = (cat) => {
            currentFilter = cat;
            renderCategories();
            renderList();
        };

        window.toggleCard = (id) => {
            expandedId = (expandedId === id) ? null : id;
            renderList();
        };

        function renderList() {
            const listElement = document.getElementById('rideList');
            const filtered = RIDES.filter(ride => {
                const matchesCat = currentFilter === "전체" || ride.category === currentFilter;
                const matchesSearch = ride.name.toLowerCase().includes(searchQuery);
                return matchesCat && matchesSearch;
            });

            document.getElementById('itemCount').innerText = `${filtered.length} ATTRACTS`;

            if (filtered.length === 0) {
                listElement.innerHTML = `
                    <div class="py-20 text-center text-slate-400">
                        <p class="text-sm font-medium">검색 결과가 없습니다.</p>
                    </div>
                `;
                return;
            }

            listElement.innerHTML = filtered.map(ride => {
                const isExpanded = expandedId === ride.id;
                return `
                <div class="card-container bg-white rounded-3xl border border-slate-200 custom-shadow overflow-hidden ${isExpanded ? 'is-expanded ring-1 ring-red-500/20' : ''}">
                    <div class="p-5 cursor-pointer" onclick="toggleCard(${ride.id})">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <div class="flex items-center gap-2 mb-1.5">
                                    <span class="text-[9px] font-black bg-slate-100 text-slate-500 px-2 py-0.5 rounded uppercase tracking-tighter border border-slate-200">${ride.location}</span>
                                    ${ride.isHot ? '<span class="text-[9px] font-black text-red-600 italic tracking-tighter uppercase">★ Top Pick</span>' : ''}
                                </div>
                                <h3 class="text-lg font-black text-slate-900 tracking-tight">${ride.name}</h3>
                            </div>
                            <div class="p-1.5 rounded-full ${isExpanded ? 'bg-red-50 text-red-500' : 'bg-slate-50 text-slate-300'}">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-4 h-4 transition-transform ${isExpanded ? 'rotate-180' : ''}">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                                </svg>
                            </div>
                        </div>

                        <!-- Mini Stats -->
                        <div class="grid grid-cols-3 gap-3 bg-slate-50/80 p-3 rounded-2xl border border-slate-100">
                            ${renderStat('FUN', ride.fun, 'bg-yellow-400')}
                            ${renderStat('THRILL', ride.thrill, 'bg-purple-500')}
                            ${renderStat('WAIT', ride.wait, 'bg-red-500')}
                        </div>

                        <!-- Description (Always visible brief) -->
                        <p class="mt-3.5 text-xs text-slate-500 leading-relaxed font-medium ${isExpanded ? '' : 'line-clamp-1'}">
                            ${ride.desc}
                        </p>

                        <!-- Expanded Content -->
                        <div class="details-panel ${isExpanded ? 'mt-5' : ''}">
                            <div class="pt-5 border-t border-dashed border-slate-200 space-y-4">
                                <div class="grid grid-cols-2 gap-2">
                                    <div class="bg-slate-50 p-3 rounded-xl">
                                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">신장 제한</p>
                                        <p class="text-xs font-bold text-slate-700">${ride.height}</p>
                                    </div>
                                    <div class="bg-slate-50 p-3 rounded-xl">
                                        <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">기타 제한</p>
                                        <p class="text-xs font-bold text-slate-700">${ride.restrictions}</p>
                                    </div>
                                </div>
                                <div class="bg-red-50 p-4 rounded-2xl border border-red-100">
                                    <div class="flex items-center gap-1.5 mb-1.5 text-red-600">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-3 h-3">
                                            <path fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z" clip-rule="evenodd" />
                                        </svg>
                                        <span class="text-[10px] font-black uppercase">User Insight Tips</span>
                                    </div>
                                    <p class="text-[11px] text-slate-700 leading-relaxed font-medium">
                                        ${ride.tips}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderStat(label, val, barColor) {
            const percent = (val / 5) * 100;
            return `
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[8px] font-black text-slate-400 tracking-wider uppercase">${label}</span>
                        <span class="text-[9px] font-black text-slate-800 tracking-tighter">${val}</span>
                    </div>
                    <div class="h-1 w-full bg-slate-200 rounded-full overflow-hidden">
                        <div class="${barColor} h-full" style="width: ${percent}%"></div>
                    </div>
                </div>
            `;
        }

        // --- 4. START APP ---
        window.onload = init;
    </script>
</body>
</html>
