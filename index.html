<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>롯데월드 인사이트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative border-x border-slate-200 pb-20">
        
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50 p-4">
            <div class="flex items-center gap-2 mb-4">
                <div class="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center text-white font-black shadow-lg shadow-red-100">L</div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight italic">LOTTE WORLD <span class="text-red-500 not-italic">INSIGHT</span></h1>
            </div>
            
            <div class="relative mb-4">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                <input v-model="searchTerm" type="text" placeholder="기구 이름을 검색해 보세요" 
                    class="w-full pl-10 pr-4 py-3 rounded-2xl bg-slate-100 border-none text-sm focus:ring-2 focus:ring-red-400 outline-none transition-all">
            </div>

            <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                <button v-for="cat in categories" :key="cat" @click="selectedCategory = cat"
                    :class="['px-4 py-2 rounded-xl whitespace-nowrap text-xs font-bold border transition-all', 
                    selectedCategory === cat ? 'bg-slate-900 text-white border-slate-900 shadow-md' : 'bg-white text-slate-400 border-slate-100']">
                    {{cat}}
                </button>
            </div>
        </header>

        <div class="p-4 space-y-4">
            <div v-for="ride in filteredRides" :key="ride.id" 
                @click="toggleExpand(ride.id)"
                :class="['group rounded-3xl border p-5 transition-all cursor-pointer shadow-sm hover:shadow-md active:scale-[0.98]', 
                ride.info.isPlanned ? 'bg-slate-50 opacity-70' : 'bg-white border-slate-100',
                expandedId === ride.id ? 'ring-2 ring-red-50 border-red-500' : '']">
                
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <div class="flex flex-wrap gap-1.5 mb-2">
                            <span class="text-[9px] font-black px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 uppercase tracking-tighter">{{ride.location}}</span>
                            <span v-if="ride.info.isPopular" class="text-[9px] font-black px-2 py-0.5 rounded-full bg-red-500 text-white shadow-sm shadow-red-200">HOT</span>
                            <span v-if="ride.info.isPlanned" class="text-[9px] font-black px-2 py-0.5 rounded-full bg-slate-800 text-white uppercase">Upcoming</span>
                        </div>
                        <h3 class="text-lg font-black text-slate-800 tracking-tight flex items-center gap-1">
                            {{ride.name}}
                            <i v-if="ride.info.reservation" data-lucide="ticket" class="w-3 h-3 text-indigo-500"></i>
                        </h3>
                    </div>
                    <div class="bg-slate-50 p-1.5 rounded-full group-hover:bg-red-50 transition-colors">
                        <i :data-lucide="expandedId === ride.id ? 'chevron-up' : 'chevron-down'" class="text-slate-400 w-4 h-4"></i>
                    </div>
                </div>

                <p v-if="expandedId !== ride.id" class="text-xs text-slate-400 mt-2 line-clamp-1 font-medium">{{ride.description}}</p>

                <div v-if="expandedId === ride.id" class="mt-5 pt-5 border-t border-slate-50 space-y-5 animate-in fade-in slide-in-from-top-2">
                    <p class="text-[13px] text-slate-600 leading-relaxed font-medium">{{ride.description}}</p>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-slate-50 p-3 rounded-2xl border border-slate-100">
                            <div class="flex items-center gap-1.5 mb-1">
                                <i data-lucide="ruler" class="w-3 h-3 text-slate-400"></i>
                                <p class="text-[10px] text-slate-400 font-bold uppercase">신장 제한</p>
                            </div>
                            <p class="text-xs font-black text-slate-800">{{ride.height || '제한 없음'}}</p>
                        </div>
                        <div class="bg-red-50/50 p-3 rounded-2xl border border-red-50">
                            <div class="flex items-center gap-1.5 mb-1">
                                <i data-lucide="zap" class="w-3 h-3 text-red-400"></i>
                                <p class="text-[10px] text-red-400 font-bold uppercase">스릴 지수</p>
                            </div>
                            <p class="text-xs font-black text-red-500">{{ride.thrill === '?' ? '정보없음' : ride.thrill + ' / 5.0'}}</p>
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-1">
                        <span v-for="tag in ride.tags" :key="tag" class="text-[10px] font-bold text-slate-500 bg-slate-100 px-2.5 py-1 rounded-lg">#{{tag}}</span>
                    </div>

                    <div class="p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100/50">
                        <p class="text-[11px] text-indigo-700 font-bold leading-relaxed flex items-start gap-1.5">
                            <i data-lucide="info" class="w-3.5 h-3.5 mt-0.5 shrink-0"></i>
                            <span>{{ride.details}}</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center py-10 opacity-20">
            <p class="text-[10px] font-black tracking-[0.2em] text-slate-900 uppercase">Premium Guide System</p>
        </footer>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;
        createApp({
            setup() {
                const searchTerm = ref('');
                const selectedCategory = ref('전체');
                const expandedId = ref(null);
                const categories = ['전체', '스릴', '어드벤처', '다크라이드', '패밀리', '키즈', '체험'];
                
                // 님이 제공한 모든 데이터 리스트
                const rides = [
                    { id: 1, name: "파라오의 분노", location: "어드벤처 4F", category: "어드벤처", thrill: 4, description: "정교한 이집트 신전 내부를 지프차로 탐험하는 모험.", tags: ["예약제", "가족", "어드벤처"], height: "110cm 이상", info: { isPopular: true, reservation: true }, details: "실제 보물을 찾는 듯한 정교한 세트장이 일품입니다." },
                    { id: 2, name: "풍선비행", location: "어드벤처 4F", category: "패밀리", thrill: 1, description: "하늘 위에서 롯데월드 전체를 조망하는 낭만적인 비행.", tags: ["고소공포주의", "뷰맛집"], height: "6세 이상", info: { isPopular: true }, details: "상당히 높은 곳에서 이동하므로 고소공포증이 있다면 주의하세요." },
                    { id: 7, name: "후렌치 레볼루션", location: "어드벤처 2F", category: "스릴", thrill: 4.5, description: "360도 회전하며 건물 사이를 아슬아슬하게 통과하는 코스터.", tags: ["싱글라이더", "스릴러"], height: "120cm 이상", info: { isPopular: true, reservation: true }, details: "실내 최고의 인기 시설입니다." },
                    { id: 10, name: "스페인 해적선", location: "어드벤처 1F", category: "스릴", thrill: 4, description: "천장에 닿을 듯 올라가는 짜릿한 무중력 상태의 바이킹.", tags: ["무중력", "스릴"], height: "110cm 이상", info: { isPopular: true }, details: "뒷자리가 가장 스릴 넘칩니다." },
                    { id: 11, name: "후룸라이드", location: "어드벤처 1F", category: "스릴", thrill: 3, description: "통나무 배를 타고 급류를 헤쳐나가는 시원한 폭포 하강.", tags: ["물튐주의", "커플추천"], height: "110cm 이상", info: { isPopular: true, reservation: true }, details: "탑승 시 물이 많이 튈 수 있습니다." },
                    { id: 35, name: "아트란티스", location: "매직아일랜드", category: "스릴", thrill: 5, description: "시속 72km 급발진과 롤러코스터의 짜릿함을 동시에.", tags: ["예약제", "강력스릴", "인기1위"], height: "135cm ~ 190cm", info: { isPopular: true, reservation: true }, details: "롯데월드 1위 인기 기구입니다." },
                    { id: 39, name: "자이로드롭", location: "매직아일랜드", category: "스릴", thrill: 5, description: "70m 상공에서 단 2초 만에 지상으로 떨어지는 공포.", tags: ["고소공포주의", "전망"], height: "130cm ~ 190cm", info: { isPopular: true }, details: "무서운 만큼 짜릿합니다." },
                    { id: 42, name: "혜성특급", location: "매직아일랜드", category: "스릴", thrill: 3.5, description: "어두운 우주 공간을 회전하며 질주하는 환상적인 코스터.", tags: ["인기기구", "우주"], height: "120cm 이상", info: { isPopular: true, reservation: true }, details: "의자가 뱅글뱅글 돕니다." },
                    { id: 100, name: "스톤 익스프레스", location: "메이플 아일랜드", category: "패밀리", thrill: "?", description: "메이플스토리 세계관 배경의 온 가족 코스터.", tags: ["오픈예정", "메이플"], height: "준비 중", info: { isPlanned: true }, details: "가족 타겟의 경쾌한 주행을 기대할 수 있습니다." }
                ];

                const filteredRides = computed(() => {
                    return rides.filter(ride => {
                        const s = searchTerm.value.toLowerCase();
                        const matchesSearch = ride.name.includes(s) || ride.description.includes(s);
                        const matchesCategory = selectedCategory.value === '전체' || ride.category === selectedCategory.value;
                        return matchesSearch && matchesCategory;
                    });
                });

                const toggleExpand = (id) => {
                    expandedId.value = expandedId.value === id ? null : id;
                    setTimeout(() => lucide.createIcons(), 10);
                };

                return { searchTerm, selectedCategory, categories, filteredRides, expandedId, toggleExpand };
            }
        }).mount('#app');
        lucide.createIcons(); // 초기 아이콘 생성
    </script>
</body>
</html>
