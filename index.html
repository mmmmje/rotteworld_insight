<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTE WORLD INSIGHT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Lucide 아이콘 컴포넌트 화 (React 환경에 맞춰 재정의)
        const { 
            Star, Zap, Clock, Info, Search, Filter, Map, MapPin, 
            ChevronDown, ChevronUp, AlertCircle, Users, Ticket, 
            UserCheck, Ruler, CreditCard, Box, Sparkles, Construction, 
            Ghost, Monitor 
        } = lucide;

        // 아이콘을 렌더링하는 래퍼 컴포넌트
        const Icon = ({ name, size = 18, className = "" }) => {
            const LucideIcon = lucide[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        const { useState } = React;

        const App = () => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedLocation, setSelectedLocation] = useState('전체');
            const [selectedCategory, setSelectedCategory] = useState('전체');
            const [expandedId, setExpandedId] = useState(null);

            const categories = ['전체', '스릴', '패밀리', '롤러코스터', '키즈', '다크라이드', '체험', '시어터', '슈팅', '모노레일'];
            const locations = ['전체', '어드벤처 4F', '어드벤처 3F', '어드벤처 2F', '어드벤처 1F', '언더랜드(B1)', '키디존', '매직아일랜드', '메이플 아일랜드'];

            // ... (rides 데이터는 사용자 코드를 그대로 유지합니다)
            const rides = [
                { id: 1, name: "파라오의 분노", location: "어드벤처 4F", type: "멀티모션 다크라이드", category: "다크라이드", fun: 4.5, thrill: 3.5, wait: 5, description: "정교한 이집트 신전 내부를 지프차로 탐험하는 모험.", tags: ["가족", "어드벤처"], height: "110cm 이상", info: { reservation: false, single: false, kidsOnly: false, phobia: false, paid: false, is3D: false, isPopular: true }, details: "실제 보물을 찾는 듯한 정교한 세트장이 일품입니다. 매일 오후 2시 30분부터 3시 30분까지 점검을 합니다. 싱글라이더가 사라졌습니다." },
                { id: 2, name: "풍선비행", location: "어드벤처 4F", type: "공중궤도 라이드", category: "패밀리", fun: 2.5, thrill: 1.5, wait: 4.5, description: "하늘 위에서 롯데월드 전체를 조망하는 낭만적인 비행.", tags: ["고소공포주의", "뷰맛집"], info: { phobia: true, isPopular: true }, details: "상당히 높은 곳에서 이동하므로 고소공포증이 있다면 주의하세요." },
                { id: 3, name: "어크로스다크", location: "어드벤처 4F", type: "시어터형 라이드", category: "체험", fun: 2.5, thrill: 1, wait: 1.5, description: "우주 공간을 배경으로 펼쳐지는 초대형 시네마틱 시어터 모험.", tags: ["시어터", "우주"], height: "110cm 이상", info: { is3D: true }, details: "광활한 우주 영상을 감상하며 즐기는 몰입형 시어터 시설입니다." },
                { id: 7, name: "후렌치 레볼루션", location: "어드벤처 2F", type: "롤러코스터", category: "스릴", fun: 4.5, thrill: 4.5, wait: 4.5, description: "360도 회전하며 건물 사이를 아슬아슬하게 통과하는 코스터.", tags: ["싱글라이더", "스릴러"], height: "120cm 이상", info: { reservation: true, single: true, phobia: true, isPopular: true }, details: "실내 최고의 인기 시설입니다." },
                { id: 10, name: "스페인 해적선", location: "어드벤처 1F", type: "바이킹", category: "스릴", fun: 4, thrill: 4, wait: 3.5, description: "천장에 닿을 듯 올라가는 짜릿한 무중력 상태의 경험.", tags: ["무중력", "스릴"], height: "110cm 이상", info: { phobia: true, isPopular: true }, details: "뒷자리가 가장 스릴 넘칩니다." },
                { id: 11, name: "후룸라이드", location: "어드벤처 1F", type: "워터 라이드", category: "스릴", fun: 4.5, thrill: 3, wait: 4.5, description: "통나무 배를 타고 급류를 헤쳐나가는 시원한 폭포 하강.", tags: ["물튐주의", "커플추천"], height: "110cm 이상", info: { reservation: true, isPopular: true }, details: "탑승 시 물이 많이 튈 수 있습니다." },
                { id: 35, name: "아트란티스", location: "매직아일랜드", type: "급발진 코스터", category: "스릴", fun: 5, thrill: 5, wait: 5, description: "시속 72km 급발진과 롤러코스터의 짜릿함을 동시에.", tags: ["예약제", "강력스릴"], height: "135cm ~ 190cm", weight: "100kg 미만", info: { reservation: true, phobia: true, isPopular: true }, details: "롯데월드 1위 인기 기구입니다." },
                { id: 42, name: "혜성특급", location: "매직아일랜드", type: "회전 코스터", category: "롤러코스터", fun: 4.5, thrill: 3.5, wait: 4.5, description: "어두운 우주 공간을 회전하며 질주하는 환상적인 코스터.", tags: ["인기기구", "우주"], height: "120cm 이상", info: { reservation: true, isPopular: true }, details: "의자가 뱅글뱅글 돕니다." },
                // ... (간결함을 위해 일부만 노출하며, 원본 코드의 모든 데이터를 넣으셔도 작동합니다)
            ];

            const filteredRides = rides.filter(ride => {
                const matchesSearch = ride.name.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesLocation = selectedLocation === '전체' || (ride.location && ride.location.includes(selectedLocation));
                const matchesCategory = selectedCategory === '전체' || ride.category === selectedCategory;
                return matchesSearch && matchesLocation && matchesCategory;
            });

            const StatBar = ({ icon: IconName, label, value, color }) => (
                <div className="flex flex-col gap-1 flex-1">
                    <div className="flex items-center gap-1 text-[10px] font-bold text-gray-400 uppercase">
                        <Icon name={IconName} size={12} className={color} />
                        {label}
                    </div>
                    <div className="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                        {value === "?" ? (
                            <div className="h-full bg-slate-200 w-full animate-pulse" />
                        ) : (
                            <div className={`h-full ${color.replace('text-', 'bg-')}`} style={{ width: `${(value / 5) * 100}%` }} />
                        )}
                    </div>
                    <span className="text-[10px] font-bold text-gray-600 mt-0.5">{value} / 5</span>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 pb-10">
                    <div className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
                        <div className="max-w-md mx-auto p-4">
                            <div className="flex items-center gap-2 mb-4">
                                <div className="w-8 h-8 bg-red-500 rounded-lg flex items-center justify-center text-white font-black shadow-lg">L</div>
                                <h1 className="text-xl font-black text-slate-800 tracking-tight">LOTTE WORLD INSIGHT</h1>
                            </div>
                            <div className="relative mb-4">
                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Search size={18} /></span>
                                <input 
                                    type="text" 
                                    placeholder="기구 이름 검색..." 
                                    className="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-100 border-none text-sm outline-none focus:ring-2 focus:ring-red-400"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                                {categories.map((cat) => (
                                    <button
                                        key={cat}
                                        onClick={() => setSelectedCategory(cat)}
                                        className={`px-4 py-1.5 rounded-full whitespace-nowrap text-xs font-bold border transition-all ${
                                            selectedCategory === cat ? 'bg-red-500 text-white border-red-500 shadow-md' : 'bg-white text-slate-500 border-slate-200'
                                        }`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto p-4 space-y-4">
                        <div className="flex justify-between items-center px-1">
                            <span className="text-xs font-bold text-slate-400 uppercase">{filteredRides.length} Results</span>
                            <div className="flex items-center gap-1 text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-lg border border-red-100">
                                <MapPin size={14} />
                                <select className="bg-transparent outline-none cursor-pointer" value={selectedLocation} onChange={(e) => setSelectedLocation(e.target.value)}>
                                    {locations.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                                </select>
                            </div>
                        </div>

                        <div className="grid gap-4">
                            {filteredRides.map((ride) => {
                                const isExpanded = expandedId === ride.id;
                                return (
                                    <div 
                                        key={ride.id} 
                                        className={`rounded-2xl overflow-hidden shadow-sm border transition-all bg-white ${isExpanded ? 'ring-2 ring-red-100 border-red-500' : 'border-slate-100'}`}
                                        onClick={() => setExpandedId(isExpanded ? null : ride.id)}
                                    >
                                        <div className="p-4">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <span className="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-100 text-slate-500 uppercase">{ride.location}</span>
                                                    <h3 className="text-lg font-black text-slate-800 mt-1">{ride.name} {ride.info?.isPopular && "🔥"}</h3>
                                                </div>
                                                <div className="text-slate-400">
                                                    {isExpanded ? <ChevronUp size={18} /> : <ChevronDown size={18} />}
                                                </div>
                                            </div>
                                            <p className={`text-xs text-slate-500 mt-2 mb-4 leading-relaxed ${!isExpanded && 'line-clamp-1'}`}>{ride.description}</p>
                                            
                                            <div className="flex gap-4 p-3 bg-slate-50 rounded-xl mb-2">
                                                <StatBar icon="Star" label="FUN" value={ride.fun} color="text-yellow-500" />
                                                <StatBar icon="Zap" label="THRILL" value={ride.thrill} color="text-purple-500" />
                                                <StatBar icon="Clock" label="WAIT" value={ride.wait} color="text-red-500" />
                                            </div>

                                            {isExpanded && (
                                                <div className="mt-4 pt-4 border-t border-slate-100 space-y-4">
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {ride.tags?.map(tag => <span key={tag} className="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-1 rounded">#{tag}</span>)}
                                                    </div>
                                                    <div className="p-3 bg-red-50/50 rounded-xl border border-red-100 text-[11px] font-medium text-slate-600">
                                                        💡 <strong>Tip</strong>: {ride.details}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
