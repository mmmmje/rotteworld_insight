<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTE WORLD INSIGHT</title>
    <!-- Tailwind CSS (Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth transitions for expansion */
        .ride-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .expand-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .expanded .expand-content { max-height: 500px; transition: max-height 0.5s ease-in; }
        .expanded { ring: 2px solid #ef4444; border-color: transparent; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); transform: translateY(-2px); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-20 bg-slate-50">

    <!-- Header Section -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-30 px-4 py-5 shadow-sm">
        <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-red-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg shadow-red-200">L</div>
                <h1 class="text-xl font-black text-slate-800 tracking-tighter italic uppercase">Lotte Insight</h1>
            </div>
            <span class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded-lg text-slate-500 border border-slate-200">CORE v1.0</span>
        </div>

        <!-- Search Bar -->
        <div class="relative mb-4">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
            <input 
                type="text" id="searchInput"
                placeholder="어트랙션 검색..." 
                class="w-full pl-10 pr-4 py-3 bg-slate-100 border-none rounded-2xl text-sm focus:ring-2 focus:ring-red-500 outline-none transition-all placeholder:text-slate-400"
            />
        </div>

        <!-- Category Filters -->
        <div id="categoryTabs" class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            <!-- Rendered by JS -->
        </div>
    </header>

    <!-- Content List -->
    <main class="p-4 space-y-4">
        <div class="flex items-center justify-between px-1 mb-2">
            <h2 id="resultStats" class="text-[11px] font-bold text-slate-400 tracking-widest uppercase">0 Attractions Found</h2>
            <div class="flex items-center gap-1 bg-white border border-slate-200 px-3 py-1.5 rounded-xl text-xs font-bold text-slate-600 shadow-sm">
                <i data-lucide="map-pin" class="text-red-500 w-3 h-3"></i>
                <select id="locationFilter" class="bg-transparent outline-none cursor-pointer ml-1 text-[11px] appearance-none">
                    <!-- Rendered by JS -->
                </select>
            </div>
        </div>

        <div id="attractionList" class="grid gap-4">
            <!-- Attraction Cards go here -->
        </div>
    </main>

    <script>
        /**
         * -------------------------------------------------------------------
         * [DATA AREA] 아래 RIDES 배열에 데이터를 추가하세요.
         * -------------------------------------------------------------------
         */
        const RIDES = [
            { 
                id: 1, 
                name: "파라오의 분노", 
                location: "어드벤처 4F", 
                category: "다크라이드", 
                fun: 4.5, 
                thrill: 3.5, 
                wait: 5, 
                description: "정교한 이집트 신전 내부를 지프차로 탐험하는 멀티모션 다크라이드입니다.", 
                height: "110cm 이상", 
                weight: "제한 없음", 
                details: "대기줄이 매우 길 수 있으므로 입장 직후나 폐장 직전 이용을 추천합니다. 실제 이집트 유물 복제품들이 곳곳에 배치되어 있습니다.", 
                isPopular: true 
            }
            // { id: 2, name: "어트랙션명", ... } 식으로 추가
        ];

        const CATEGORIES = ['전체', '스릴', '패밀리', '롤러코스터', '키즈', '다크라이드', '체험', '시어터', '슈팅', '모노레일'];
        const LOCATIONS = ['전체', '어드벤처 4F', '어드벤처 3F', '어드벤처 2F', '어드벤처 1F', '언더랜드(B1)', '키디존', '매직아일랜드', '메이플 아일랜드'];

        let state = {
            search: '',
            category: '전체',
            location: '전체',
            expandedId: null
        };

        // Initialize App
        function init() {
            renderFilters();
            renderList();
            
            // Search Input Event
            document.getElementById('searchInput').addEventListener('input', (e) => {
                state.search = e.target.value.toLowerCase();
                renderList();
            });

            // Location Filter Event
            document.getElementById('locationFilter').addEventListener('change', (e) => {
                state.location = e.target.value;
                renderList();
            });
        }

        // Render UI Elements
        function renderFilters() {
            // Category Tabs
            const tabContainer = document.getElementById('categoryTabs');
            tabContainer.innerHTML = CATEGORIES.map(cat => `
                <button onclick="updateCategory('${cat}')" class="px-4 py-2 rounded-full whitespace-nowrap text-xs font-bold border transition-all ${state.category === cat ? 'bg-red-600 text-white border-red-600 shadow-md shadow-red-100 scale-105' : 'bg-white text-slate-500 border-slate-200'}">
                    ${cat}
                </button>
            `).join('');

            // Location Dropdown
            const locSelect = document.getElementById('locationFilter');
            locSelect.innerHTML = LOCATIONS.map(loc => `<option value="${loc}">${loc}</option>`).join('');
        }

        // Handle Category Change
        window.updateCategory = (cat) => {
            state.category = cat;
            renderFilters();
            renderList();
        };

        // Render List based on filters
        function renderList() {
            const listContainer = document.getElementById('attractionList');
            const filtered = RIDES.filter(ride => {
                const matchesSearch = ride.name.toLowerCase().includes(state.search);
                const matchesCategory = state.category === '전체' || ride.category === state.category;
                const matchesLocation = state.location === '전체' || ride.location.includes(state.location);
                return matchesSearch && matchesCategory && matchesLocation;
            });

            document.getElementById('resultStats').innerText = `${filtered.length} Attractions Found`;

            if (filtered.length === 0) {
                listContainer.innerHTML = `<div class="py-20 text-center text-slate-400 font-medium bg-white rounded-3xl border border-dashed border-slate-200">검색 결과가 없습니다.</div>`;
                return;
            }

            listContainer.innerHTML = filtered.map(ride => `
                <div id="card-${ride.id}" class="ride-card bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden cursor-pointer ${state.expandedId === ride.id ? 'expanded' : ''}" onclick="handleCardClick(${ride.id})">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <div class="flex items-center gap-1.5 mb-1.5">
                                    <span class="text-[9px] font-bold bg-slate-100 text-slate-500 px-2 py-0.5 rounded border border-slate-200 uppercase">${ride.location}</span>
                                    ${ride.isPopular ? '<span class="text-[9px] font-black text-red-500 uppercase italic">Popular 🔥</span>' : ''}
                                </div>
                                <h3 class="text-lg font-black text-slate-800">${ride.name}</h3>
                            </div>
                            <div class="p-1.5 rounded-full bg-slate-50 text-slate-300">
                                <i data-lucide="${state.expandedId === ride.id ? 'chevron-up' : 'chevron-down'}" class="w-5 h-5"></i>
                            </div>
                        </div>

                        <p class="text-xs text-slate-500 mb-4 leading-relaxed ${state.expandedId === ride.id ? '' : 'line-clamp-1'}">
                            ${ride.description}
                        </p>

                        <!-- Stats Bar -->
                        <div class="flex gap-4 p-3.5 bg-slate-50 rounded-2xl border border-slate-100">
                            ${renderStatItem('star', 'FUN', ride.fun, 'text-yellow-500')}
                            ${renderStatItem('zap', 'THRILL', ride.thrill, 'text-purple-600')}
                            ${renderStatItem('clock', 'WAIT', ride.wait, 'text-red-500')}
                        </div>

                        <!-- Expandable Content -->
                        <div class="expand-content">
                            <div class="pt-5 mt-5 border-t border-slate-100 space-y-4">
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="flex items-center gap-2.5 p-3 rounded-xl bg-white border border-slate-100">
                                        <i data-lucide="ruler" class="w-4 h-4 text-slate-400"></i>
                                        <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-bold uppercase">키 제한</span><span class="text-[11px] font-bold text-slate-700">${ride.height}</span></div>
                                    </div>
                                    <div class="flex items-center gap-2.5 p-3 rounded-xl bg-white border border-slate-100">
                                        <i data-lucide="alert-circle" class="w-4 h-4 text-slate-400"></i>
                                        <div class="flex flex-col"><span class="text-[9px] text-slate-400 font-bold uppercase">기타 제한</span><span class="text-[11px] font-bold text-slate-700">${ride.weight}</span></div>
                                    </div>
                                </div>
                                <div class="p-4 bg-red-50/50 rounded-2xl border border-red-100">
                                    <p class="text-[11px] font-medium text-slate-700 leading-relaxed">${ride.details}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            // Trigger Icon Rendering
            lucide.createIcons();
        }

        // Helper: Render Single Stat Bar
        function renderStatItem(icon, label, value, color) {
            const num = parseFloat(value) || 0;
            const percent = (num / 5) * 100;
            return `
                <div class="flex-1">
                    <div class="flex items-center gap-1 text-[9px] font-bold ${color} mb-1.5 uppercase">
                        <i data-lucide="${icon}" class="w-3 h-3"></i> ${label}
                    </div>
                    <div class="h-1.5 w-full bg-slate-200 rounded-full overflow-hidden">
                        <div class="h-full ${color.replace('text-', 'bg-')}" style="width: ${percent}%"></div>
                    </div>
                    <div class="text-[9px] font-bold text-slate-400 mt-1.5">${value}</div>
                </div>
            `;
        }

        // Handle Card Toggle
        window.handleCardClick = (id) => {
            state.expandedId = state.expandedId === id ? null : id;
            renderList();
        };

        // App Start
        window.onload = init;
    </script>
</body>
</html>
